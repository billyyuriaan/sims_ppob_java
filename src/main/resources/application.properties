spring.application.name=simsppob
spring.config.import=optional:file:.env

## PostgreSQL
spring.datasource.url=jdbc:postgresql://${RAILWAY_TCP_PROXY_DOMAIN}:${RAILWAY_TCP_PROXY_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

railway.s3.endpointurl=https://t3.storageapi.dev
railway.s3.bucketname=portable-packet-q6bgozxwc
railway.s3.region=auto
railway.s3.id-key=${AWS_ACCESS_KEY_ID}
railway.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
